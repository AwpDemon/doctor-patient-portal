name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Seed the database
        env:
          SESSION_SECRET: ci-test-secret
          NODE_ENV: test
        run: npm run seed

      - name: Run test suite (21 tests)
        env:
          SESSION_SECRET: ci-test-secret
          NODE_ENV: test
        run: npm test

      - name: Boot server and hit /api/health
        env:
          SESSION_SECRET: ci-test-secret
          PORT: 3000
        run: |
          npm start &
          SERVER_PID=$!
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000/api/health > /dev/null; then
              echo "Server healthy after ${i}s"
              break
            fi
            sleep 1
          done
          curl -sf http://localhost:3000/api/health | tee health.json
          grep -q '"status":"ok"' health.json
          kill $SERVER_PID || true
